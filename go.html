<!DOCTYPE html>
<html>
<head>
    <title>Opening in Chrome...</title>
    <script>
        window.onload = function() {
            var destination = "https://eclipse7-pixal.github.io/marking-calculator/";
            var chromeIntent = "googlechrome://navigate?url=" + destination;
            
            // Attempt to trigger the Chrome app
            window.location.href = chromeIntent;

            // Fallback: If Chrome doesn't open after 2 seconds, load the site normally
            setTimeout(function() {
                window.location.href = destination;
            }, 2000);
        };
    </script>
</head>
<body>
    <p>Redirecting to Marking Calculator...</p>
</body>
</html>
