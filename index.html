<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eclipse7 | Pro Marking Calculator</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
    <div class="calculator-card">
        <div class="brand-header">
            <h1>eclipse7</h1>
            <p>Advanced Scoring System</p>
        </div>

        <div class="input-grid">
            <input type="text" id="studentName" placeholder="Student Name">
            <input type="text" id="testName" placeholder="Test Name">
        </div>

        <hr>

        <div class="input-group">
            <label>Total Attempted</label>
            <input type="number" id="attempted" placeholder="0">
        </div>
        <div class="input-group">
            <label>Number of Wrong</label>
            <input type="number" id="wrong" placeholder="0">
        </div>
        <div class="input-group">
            <label>Negative Marking Ratio (1/X)</label>
            <input type="number" id="ratio" value="3">
        </div>

        <button class="btn-calc" onclick="calculateScore()">Calculate Score</button>
        
        <div id="result" class="result-box">
            <p>Score: <span id="score">0.00</span></p>
        </div>

        <button class="btn-pdf" onclick="downloadPDF()">Download Official Report</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
