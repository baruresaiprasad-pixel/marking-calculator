<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Scoring Engine | ECLIPSE7</title>
    <link rel="icon" type="image/png" href="logo.png">
    <style>
        :root { --neon-blue: #38bdf8; --deep-slate: #0f172a; --glass-bg: rgba(255, 255, 255, 0.03); --glass-border: rgba(255, 255, 255, 0.1); }
        body { background-color: var(--deep-slate); color: white; font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .calculator-card { background: var(--glass-bg); backdrop-filter: blur(12px); border: 1px solid var(--glass-border); padding: 40px; border-radius: 24px; width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        h1 { font-size: 1.8rem; margin-bottom: 5px; background: linear-gradient(to right, #fff, #38bdf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; }
        .subtitle { text-align: center; color: #94a3b8; font-size: 0.65rem; letter-spacing: 1px; margin-bottom: 30px; text-transform: uppercase; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.75rem; color: #38bdf8; margin-bottom: 5px; font-weight: 600; }
        input, select { width: 100%; padding: 12px; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--glass-border); border-radius: 8px; color: white; box-sizing: border-box; transition: all 0.3s ease; }
        input:focus { border-color: var(--neon-blue); outline: none; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .ai-btn { width: 100%; padding: 15px; margin-top: 20px; border: none; border-radius: 12px; font-weight: 700; text-transform: uppercase; cursor: pointer; transition: all 0.4s ease; }
        .calc-btn { background: linear-gradient(135deg, #0ea5e9 0%, #2563eb 100%); color: white; box-shadow: 0 0 20px rgba(37, 99, 235, 0.3); }
        .calc-btn:hover { transform: translateY(-3px); box-shadow: 0 0 30px rgba(56, 189, 248, 0.6); }
        .download-btn { background: transparent; color: var(--neon-blue); border: 1px solid var(--neon-blue); margin-top: 10px; }
        .download-btn:hover { background: var(--neon-blue); color: var(--deep-slate); }
        .result-box { background: rgba(56, 189, 248, 0.05); border: 1px dashed var(--neon-blue); border-radius: 12px; padding: 20px; text-align: center; margin-top: 25px; }
        .result-box h2 { margin: 0; color: var(--neon-blue); font-size: 2.2rem; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body>
<div class="calculator-card">
    <h1>Strategic Scoring Engine</h1>
    <p class="subtitle">POWERED BY ECLIPSE7 AI MADE BY SAIPRASAD BARURE</p>

    <div class="input-group">
        <input type="text" id="studentName" placeholder="Full Student Identity">
        <input type="text" id="testName" placeholder="Assessment Name (e.g. NEET-26/JEE-26)">
    </div>

    <div class="grid-2">
        <div class="input-group"><label>Question Count</label><input type="number" id="totalQs" value="75"></div>
        <div class="input-group"><label>Maximum Marks</label><input type="number" id="maxMarks" value="300"></div>
    </div>
    <div class="grid-2">
        <div class="input-group"><label>Total Attempts</label><input type="number" id="attempted"></div>
        <div class="input-group"><label>Total Inaccuracies</label><input type="number" id="wrong"></div>
    </div>

    <div class="input-group">
        <label>Intelligence Depth</label>
        <select id="reportType" onchange="toggleSubjectInputs()">
            <option value="overall">Standard Analysis</option>
            <option value="subjectwise">Subject-wise Analysis</option>
        </select>
    </div>

    <div id="subjectSection" style="display: none; margin-bottom: 20px;">
        <div class="grid-2" style="grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 8px;">
            <input type="number" id="phyT" placeholder="Phy T">
            <input type="number" id="phyC" placeholder="Phy C">
            <input type="number" id="phyW" placeholder="Phy W">
        </div>
        <div class="grid-2" style="grid-template-columns: 1fr 1fr 1fr; gap: 5px; margin-bottom: 8px;">
            <input type="number" id="chemT" placeholder="Chem T">
            <input type="number" id="chemC" placeholder="Chem C">
            <input type="number" id="chemW" placeholder="Chem W">
        </div>
        <div class="grid-2" style="grid-template-columns: 1fr 1fr 1fr; gap: 5px;">
            <input type="number" id="mathBioT" placeholder="M/B T">
            <input type="number" id="mathBioC" placeholder="M/B C">
            <input type="number" id="mathBioW" placeholder="M/B W">
        </div>
    </div>

    <button onclick="calculateScore()" class="ai-btn calc-btn">Check Score</button>
    <div class="result-box">
        <p style="font-size: 0.7rem; margin-bottom: 5px;">VERIFIED SCORE</p>
        <h2 id="score">0.00</h2>
    </div>
    <button onclick="downloadPDF()" class="ai-btn download-btn">Generate Official Report</button>
</div>
<script src="script.js"></script>
</body>
</html>
