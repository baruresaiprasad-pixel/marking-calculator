<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic Scoring Engine | ECLIPSE7</title>
    <style>
        :root {
            --bg-deep: #050505;
            --card-dark: #0d0d0d;
            --accent-cyan: #00f2ff;
            --text-dim: #9ca3af;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        body {
            background: radial-gradient(circle at top right, #111, var(--bg-deep));
            color: #e5e7eb;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .ai-container {
            background: var(--card-dark);
            border: 1px solid var(--glass-border);
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 1.6rem;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 5px;
        }

        .branding {
            text-align: center;
            font-size: 0.65rem;
            color: var(--accent-cyan);
            letter-spacing: 3px;
            margin-bottom: 30px;
            opacity: 0.8;
            text-transform: uppercase;
        }

        /* Fixed vertical stacking for top inputs */
        .input-group-full {
            margin-bottom: 12px;
        }

        .input-row { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 12px; 
            margin-bottom: 12px; 
        }

        input, select {
            background: #151515;
            border: 1px solid #222;
            padding: 14px;
            border-radius: 10px;
            color: white;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { 
            border-color: var(--accent-cyan); 
            outline: none; 
            box-shadow: 0 0 10px rgba(0, 242, 255, 0.1); 
        }

        label { 
            font-size: 0.7rem; 
            color: var(--text-dim); 
            margin-bottom: 5px; 
            display: block; 
            text-transform: uppercase; 
        }

        .btn-core {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            border: none;
            margin-top: 15px;
            transition: 0.4s ease;
        }

        .btn-execute { background: #fff; color: #000; }
        .btn-execute:hover { background: var(--accent-cyan); transform: scale(1.01); }

        .btn-dossier { background: transparent; color: #fff; border: 1px solid #333; }
        .btn-dossier:hover { border-color: var(--accent-cyan); color: var(--accent-cyan); }

        .score-display {
            background: #000;
            border: 1px solid #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            margin: 20px 0;
        }

        .score-val { font-size: 2.5rem; font-weight: 300; color: var(--accent-cyan); }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
</head>
<body>

<div class="ai-container">
    <h1>Strategic Scoring Engine</h1>
    <p class="branding">Powered by ECLIPSE7 AI | BY SAIPRASAD BARURE</p>

    <div class="input-group-full">
        <input type="text" id="studentName" placeholder="STUDENT IDENTITY">
    </div>
    <div class="input-group-full">
        <input type="text" id="testName" placeholder="ASSESSMENT TAG (e.g. JEE-26)">
    </div>

    <div class="input-row">
        <div><label>Questions</label><input type="number" id="totalQs" value="75"></div>
        <div><label>Max Marks</label><input type="number" id="maxMarks" value="300"></div>
    </div>

    <div class="input-row">
        <div><label>Attempts</label><input type="number" id="attempted"></div>
        <div><label>Inaccuracies</label><input type="number" id="wrong"></div>
    </div>

    <select id="reportType" onchange="toggleSubjectInputs()" style="margin-top: 10px;">
        <option value="overall">OVERALL ANALYTICS</option>
        <option value="subjectwise">DETAILED SUBJECT BREAKDOWN</option>
    </select>

    <div id="subjectSection" style="display: none; margin-top: 15px;">
        <p style="font-size: 0.6rem; color: var(--text-dim); margin-bottom: 8px;">[TOTAL] | [CORRECT] | [WRONG]</p>
        <div class="input-row" style="grid-template-columns: 1fr 1fr 1fr; margin-bottom: 8px;">
            <input type="number" id="phyT" placeholder="PHY T">
            <input type="number" id="phyC" placeholder="PHY C">
            <input type="number" id="phyW" placeholder="PHY W">
        </div>
        <div class="input-row" style="grid-template-columns: 1fr 1fr 1fr; margin-bottom: 8px;">
            <input type="number" id="chemT" placeholder="CHEM T">
            <input type="number" id="chemC" placeholder="CHEM C">
            <input type="number" id="chemW" placeholder="CHEM W">
        </div>
        <div class="input-row" style="grid-template-columns: 1fr 1fr 1fr;">
            <input type="number" id="mathBioT" placeholder="M/B T">
            <input type="number" id="mathBioC" placeholder="M/B C">
            <input type="number" id="mathBioW" placeholder="M/B W">
        </div>
    </div>

    <button onclick="calculateScore()" class="btn-core btn-execute">Execute Verification</button>

    <div class="score-display">
        <label>Calculated Metric</label>
        <div id="score" class="score-val">0.00</div>
    </div>

    <button onclick="downloadPDF()" class="btn-core btn-dossier">Export Intelligence Dossier</button>
</div>

<script src="script.js"></script>
</body>
</html>
